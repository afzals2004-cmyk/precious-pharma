<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Precious Pharma</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 2rem auto;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <nav class="container">
            <div class="logo">Precious Pharma</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/cart.html">Back to Cart</a>
            </div>
        </nav>
    </header>

    <main class="container checkout-container">
        <h1 style="color: var(--color-primary); margin-bottom: 1.5rem;">Checkout</h1>
        <form id="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required>
            </div>
            <p><strong>Total: <span id="checkout-total">...</span></strong></p>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Place Order</button>
        </form>
    </main>

    <script>
        const getCart = () => JSON.parse(localStorage.getItem('cart')) || [];
        const cart = getCart();
        const total = cart.reduce((sum, item) => sum + Number(item.price), 0);

        document.getElementById('checkout-total').innerText = '$' + total.toFixed(2);

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }

            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login to place an order.');
                window.location.href = '/login.html';
                return;
            }

            const items = cart.map(p => ({
                product_id: p.id,
                quantity: 1, // Simplified
                price: p.price
            }));

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        items,
                        total_price: total,
                        status: 'pending'
                    })
                });

                if (res.ok) {
                    alert('Order placed successfully!');
                    localStorage.removeItem('cart');
                    window.location.href = '/dashboard.html';
                } else {
                    const data = await res.json();
                    alert('Failed to place order: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Something went wrong.');
            }
        });
    </script>
</body>

</html>
